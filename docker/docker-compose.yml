# =========================================================
# Glovo UZ — docker-compose.yml (production / staging)
#
# Services map 1:1 to Section 26 "Deployment Architecture" of the design doc:
#   backend-api, celery-worker, celery-beat, channels/websocket process,
#   postgres, redis, nginx reverse proxy, object storage (external/S3-compatible).
#
# Usage:
#   docker compose --env-file .env.prod up -d --build
# =========================================================

x-django-build: &django-build
  context: ..
  dockerfile: docker/django/Dockerfile
  args:
    REQUIREMENTS_FILE: requirements/prod.txt

x-django-common: &django-common
  build: *django-build
  image: glovo-uz-backend:latest
  env_file:
    - ../.env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - glovo-network
  restart: unless-stopped
  volumes:
    - static_volume:/app/staticfiles
    - media_volume:/app/mediafiles

services:

  # ---------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: glovo_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-glovo_uz}
      POSTGRES_USER: ${POSTGRES_USER:-glovo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - glovo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glovo_user} -d ${POSTGRES_DB:-glovo_uz}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  # ---------------------------------------------------------
  # Redis (Celery broker/result backend + Channels layer + cache)
  # ---------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: glovo_redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    volumes:
      - redis_data:/data
    networks:
      - glovo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  # ---------------------------------------------------------
  # backend-api: Django/DRF (gunicorn, WSGI HTTP API)
  # ---------------------------------------------------------
  backend-api:
    <<: *django-common
    container_name: glovo_backend_api
    environment:
      SERVICE_ROLE: api
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-4}
      --threads ${GUNICORN_THREADS:-2}
      --timeout 60
      --access-logfile -
      --error-logfile -
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------
  # channels/websocket process: Django Channels (ASGI, daphne/uvicorn)
  # Realtime: order tracking, courier offers, merchant order events (Section 18)
  # ---------------------------------------------------------
  channels-worker:
    <<: *django-common
    container_name: glovo_channels_worker
    environment:
      SERVICE_ROLE: channels
    command: >
      daphne -b 0.0.0.0 -p 8001 config.asgi:application
    expose:
      - "8001"

  # ---------------------------------------------------------
  # celery-worker: background jobs (Section 24) — notifications, payments,
  # dispatch reassignment, stale cart cleanup, analytics aggregation, etc.
  # ---------------------------------------------------------
  celery-worker:
    <<: *django-common
    container_name: glovo_celery_worker
    environment:
      SERVICE_ROLE: worker
    command: >
      celery -A config worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-4}
      -Q default,payments,notifications,dispatch
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------
  # celery-beat: periodic tasks (verify_pending_transaction,
  # daily_reconciliation, auto_cancel_unpaid_orders, expire_stale_transactions...)
  # ---------------------------------------------------------
  celery-beat:
    <<: *django-common
    container_name: glovo_celery_beat
    environment:
      SERVICE_ROLE: beat
    command: >
      celery -A config beat
      --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ---------------------------------------------------------
  # telegram-bot: OTP yetkazish va TelegramBinding tasdiqlash
  # Polling (dev) yoki webhook (prod) rejimida ishlaydi.
  # ---------------------------------------------------------
  telegram-bot:
    <<: *django-common
    container_name: glovo_telegram_bot
    environment:
      SERVICE_ROLE: telegram_bot
    command: >
      python -m telegram_bot.main
    restart: unless-stopped

  # ---------------------------------------------------------
  # Nginx reverse proxy — routes /ws/* to channels, everything else to backend-api,
  # serves collected static files directly.
  # ---------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: glovo_nginx
    depends_on:
      - backend-api
      - channels-worker
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-localhost}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - glovo-network
    restart: unless-stopped
    # The official nginx image auto-renders any file placed in
    # /etc/nginx/templates/*.template via envsubst into /etc/nginx/conf.d/
    # on container start, substituting ${NGINX_SERVER_NAME} from environment.

networks:
  glovo-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
